  function useReveal() {
    const ref = useRef(null);
    useEffect(() => {
      const el = ref.current;
      if (!el) return;
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add("is-in");
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.18, rootMargin: "0px 0px -40px 0px" });
      el.querySelectorAll(".reveal").forEach(n => io.observe(n));
      return () => io.disconnect();
    }, []);
    return ref;
  }

  function CountUp({ to, decimals = 0, duration = 1400, suffix = "", prefix = "" }) {
    const [val, setVal] = useState(0);
    const ref = useRef(null);
    const startedRef = useRef(false);
    useEffect(() => {
      const el = ref.current;
      if (!el) return;
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting && !startedRef.current) {
            startedRef.current = true;
            const steps = 60;
            const stepMs = duration / steps;
            let i = 0;
            const id = setInterval(() => {
              i += 1;
              const t = i / steps;
              const eased = 1 - Math.pow(1 - t, 3);
              setVal(to * eased);
              if (i >= steps) { setVal(to); clearInterval(id); }
            }, stepMs);
            io.unobserve(el);
          }
        });
      }, { threshold: 0.4 });
      io.observe(el);
      return () => io.disconnect();
    }, [to, duration]);

    const formatted = decimals === 0
      ? Math.round(val).toLocaleString("ja-JP")
      : val.toFixed(decimals);
    return <span ref={ref} className="tnum stat-num">{prefix}{formatted}{suffix}</span>;
  }

  /* ============================================================
     APP
     ============================================================ */

  function App() {
    const [lang, setLangState] = useState("ja");

    const setLang = useCallback((next) => {
      if (next === lang) return;
      // fade out
      document.body.classList.add("lang-switching");
      setTimeout(() => {
        setLangState(next);
        document.body.setAttribute("data-lang", next);
        document.documentElement.setAttribute("lang", next === "ja" ? "ja" : "zh");
        // fade in next frame
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            document.body.classList.remove("lang-switching");
          });
        });
      }, 280);
    }, [lang]);

    return (
      <LangCtx.Provider value={{ lang, setLang }}>
        <TopBar />
        <main>
          <Hero />
          <WhyNow />
          <Curriculum />
          <Capabilities />
          <Scope />
          <Paths />
          <CourseInfo />
          <Closing />
        </main>
        <Footer />
      </LangCtx.Provider>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
